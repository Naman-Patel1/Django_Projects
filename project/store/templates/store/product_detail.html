{% extends 'store/base.html' %}
{% block content %}
<div class="container mb-5 pt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'store-home' %}">Home</a></li>
            <li class="breadcrumb-item"><a href="{% url 'store-products' %}">Products</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ product.name }}</li>
        </ol>
    </nav>
    <div class="row align-items-center mt-5">
        <div class="col-md-6 mb-4 mb-md-0">
            {% if product.image %}
                <img src="{{ product.image.url }}" class="img-fluid rounded" alt="{{ product.name }}" style="width: 100%; max-height: 500px; object-fit: cover;">
            {% elif product.image_url %}
                <img src="{{ product.image_url }}" class="img-fluid rounded" alt="{{ product.name }}" style="width: 100%; max-height: 500px; object-fit: cover;">
            {% else %}
                <div class="bg-dark rounded d-flex align-items-center justify-content-center text-muted" style="height: 400px; border: 1px solid #333;">
                    No Image Available
                </div>
            {% endif %}
        </div>
        <div class="col-md-6 px-4">
            <h1 class="display-5 fw-bold mb-3">{{ product.name }}</h1>
            <h2 class="text-primary fw-bold mb-4">₹{{ product.price }}</h2>
            <p class="lead text-muted mb-5">{{ product.description }}</p>
            <form method="POST" action="{% url 'store-add-to-cart' product.id %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary btn-lg w-100" style="border-radius: 50px;">Add to Cart</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
