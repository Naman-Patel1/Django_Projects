{% extends 'store/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container mb-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card bg-dark border-secondary shadow-sm" style="border-radius: 15px;">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4 text-center">Create an Account</h2>
                    <form method="POST">
                        {% csrf_token %}
                        {{ register_form|crispy }}
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg" style="border-radius: 50px;">Sign Up</button>
                        </div>
                    </form>
                    <div class="text-center mt-4">
                        <p class="text-muted">Already have an account? <a href="{% url 'store-login' %}">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
